<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Fiches produits</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --color-bg-dark:#0B2E36;
    --color-bg-canvas:#F4F7F8;
    --color-bg-page:#FFFFFF;
    --color-surface-card:#FFFFFF;
    --color-border:#E3E9EB;

    --color-accent-primary:#0080D7;   /* blue - document/info */
    --color-accent-secondary:#00879A; /* teal - highlights, links, active tab */
    --color-accent-orange:#FF4F30;    /* attention / required */
    --color-accent-green:#059954;     /* success / step 3 */
    --sq-teal-200:#7DD8CE;

    --color-text-heading:#12232A;
    --color-text-primary:#33454C;
    --color-text-muted:#66787F;
    --color-text-inverse:#FFFFFF;
    --color-text-inverse-muted:rgba(255,255,255,.72);

    --radius-sm:6px;
    --radius-md:10px;
    --radius-lg:16px;
    --radius-pill:999px;
    --shadow-card:0 4px 16px rgba(10,40,45,.08);

    --font-display:'Poppins',sans-serif;
    --font-body:'Inter',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--color-bg-canvas);
    color:var(--color-text-primary);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--color-accent-secondary);}
  ::-webkit-scrollbar{width:0;height:0;}
  input::placeholder,textarea::placeholder{color:var(--color-text-muted);opacity:.8;}

  #app-shell{
    max-width:460px;
    margin:0 auto;
    min-height:100vh;
    background:var(--color-bg-page);
    display:flex;
    flex-direction:column;
    position:relative;
  }
  #scroll-area{
    flex:1;
    padding-bottom:78px;
  }

  /* ---------- Header ---------- */
  .dc-header{
    padding:42px 20px 18px;
    background:var(--color-bg-dark);
    position:relative;
    overflow:hidden;
  }
  .dc-header .deco{ position:absolute; top:-50px; right:-50px; opacity:.3; }
  .dc-eyebrow{
    font-family:var(--font-display); font-size:11.5px; font-weight:700;
    letter-spacing:.1em; text-transform:uppercase; color:var(--color-text-inverse-muted);
    margin:0 0 6px; position:relative;
  }
  .dc-title{
    font-family:var(--font-display); font-weight:700; font-size:23px;
    color:var(--color-text-inverse); margin:0 0 16px; position:relative;
  }
  .search-wrap{ position:relative; }
  #search-input{
    width:100%; box-sizing:border-box; font-size:16px; font-family:var(--font-body);
    padding:13px 40px 13px 15px; border-radius:var(--radius-md); border:none; outline:none;
    background:#fff; color:var(--color-text-primary); box-shadow:var(--shadow-card);
  }
  #clear-btn{
    position:absolute; right:8px; top:50%; transform:translateY(-50%);
    background:none; border:none; color:var(--color-text-muted); font-size:20px;
    cursor:pointer; padding:6px 8px; line-height:1; display:none;
  }

  .content-pad{ padding:16px 18px 24px; }

  /* ---------- Result cards ---------- */
  .result-count{ font-size:13px; font-weight:600; color:var(--color-text-muted); margin:2px 4px 12px; }
  .results-list{ display:flex; flex-direction:column; gap:9px; }
  .result-card{
    cursor:pointer; background:var(--color-surface-card); border:1px solid var(--color-border);
    border-left:4px solid var(--color-accent-secondary); border-radius:var(--radius-md);
    padding:14px 15px; display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  .result-card:active{ transform:scale(.99); }
  .result-name{
    font-family:var(--font-display); font-weight:600; font-size:14.5px; line-height:1.35;
    color:var(--color-text-heading); margin:0; overflow-wrap:anywhere;
  }
  .result-name mark{ background:rgba(255,207,0,.35); color:var(--color-text-heading); border-radius:2px; font-weight:700; }

  .empty-state{ text-align:center; padding:44px 16px; }
  .empty-state .big{ font-family:var(--font-display); font-weight:700; font-size:17px; color:var(--color-text-heading); margin-bottom:8px; }
  .empty-state .sub{ font-size:13.5px; color:var(--color-text-muted); line-height:1.5; margin-bottom:16px; }
  .empty-state .req-link{
    background:none; border:none; color:var(--color-accent-secondary); font-family:var(--font-display);
    font-weight:600; font-size:13.5px; border-bottom:1.5px solid var(--color-accent-secondary);
    padding:0 0 1px; cursor:pointer;
  }

  /* ---------- Hint / landing ---------- */
  .hint-card{
    background:var(--color-surface-card); border:1px solid var(--color-border); border-radius:var(--radius-lg);
    padding:20px 18px; margin-bottom:16px; text-align:center;
  }
  .hint-card h2{ font-family:var(--font-display); font-size:17px; font-weight:600; margin:0 0 8px; color:var(--color-text-heading); }
  .hint-card p{ font-size:13.5px; color:var(--color-text-muted); line-height:1.55; margin:0; }

  .step-row{ display:flex; flex-direction:column; gap:9px; margin-bottom:16px; }
  .step-item{
    background:var(--color-surface-card); border:1px solid var(--color-border); border-radius:var(--radius-md);
    padding:13px 15px; display:flex; align-items:center; gap:13px;
  }
  .step-icon{ flex-shrink:0; width:36px; height:36px; border-radius:var(--radius-pill); display:flex; align-items:center; justify-content:center; }
  .step-num{ font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--color-text-muted); margin:0 0 2px; }
  .step-desc{ font-size:13.5px; font-weight:600; color:var(--color-text-primary); margin:0; line-height:1.3; }

  .total-line{ text-align:center; font-size:12.5px; color:var(--color-text-muted); margin:0; }
  .total-line .count{ font-weight:700; color:var(--color-accent-secondary); }

  /* ---------- Product detail ---------- */
  .detail-header{ padding:42px 20px 22px; background:var(--color-bg-dark); position:relative; overflow:hidden; }
  .back-btn{
    display:flex; align-items:center; gap:6px; background:transparent; border:none;
    color:var(--color-text-inverse-muted); font-family:var(--font-display); font-weight:600; font-size:14px;
    padding:0; margin-bottom:14px; cursor:pointer; position:relative;
  }
  .badge{
    display:inline-flex; align-items:center; height:24px; padding:0 10px; border-radius:var(--radius-pill);
    background:rgba(125,216,206,.22); color:var(--sq-teal-200); font-family:var(--font-display);
    font-weight:700; font-size:11px; letter-spacing:.03em; text-transform:uppercase; position:relative;
  }
  .detail-title{ font-family:var(--font-display); font-weight:700; font-size:20px; line-height:1.3; color:var(--color-text-inverse); margin:10px 0 0; position:relative; }

  .callout{ border-radius:var(--radius-md); padding:14px 15px; display:flex; gap:12px; }
  .callout.attention{ background:rgba(255,79,48,.07); border:1px solid rgba(255,79,48,.22); }
  .callout.success{ background:rgba(5,153,84,.08); border:1px solid rgba(5,153,84,.24); }
  .callout.info{ background:rgba(0,128,215,.07); border:1px solid rgba(0,128,215,.22); }
  .callout .c-title{ font-family:var(--font-display); font-weight:700; font-size:13.5px; margin:0 0 4px; color:var(--color-text-heading); }
  .callout .c-body{ font-size:13px; line-height:1.5; color:var(--color-text-primary); margin:0; }

  .info-row{
    display:flex; align-items:center; gap:12px; padding:14px; border:1px solid var(--color-border);
    border-radius:var(--radius-md); background:var(--color-surface-card);
  }
  .info-row .icon-badge{ width:38px; height:38px; border-radius:var(--radius-pill); background:rgba(0,128,215,.1); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .info-row p{ font-size:13.5px; line-height:1.4; color:var(--color-text-primary); margin:0; }

  .btn-primary{
    display:flex; align-items:center; justify-content:center; gap:8px; width:100%;
    background:var(--color-accent-secondary); color:#fff; border:none; border-radius:var(--radius-md);
    font-family:var(--font-display); font-weight:600; font-size:15px; padding:15px; cursor:pointer;
    text-decoration:none; box-sizing:border-box;
  }
  .btn-primary:hover{ background:var(--color-bg-dark); }

  /* ---------- Request tab ---------- */
  .tab-pad{ padding:42px 20px 30px; }
  .tab-eyebrow{ font-family:var(--font-display); font-size:11.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--color-accent-secondary); margin:0 0 6px; }
  .tab-title{ font-family:var(--font-display); font-weight:700; font-size:21px; color:var(--color-text-heading); margin:0 0 18px; }

  .intro-box{ background:var(--color-bg-canvas); border-radius:var(--radius-md); padding:14px 16px; margin-bottom:18px; }
  .intro-box p{ font-size:13.5px; color:var(--color-text-primary); line-height:1.55; margin:0; }

  .field-group{ display:flex; flex-direction:column; gap:14px; }
  .field label{ display:block; font-size:13px; font-weight:700; color:var(--color-text-heading); margin-bottom:6px; }
  .field label .req{ color:var(--color-accent-orange); }
  .field input, .field textarea{
    width:100%; box-sizing:border-box; font-size:15px; font-family:var(--font-body);
    padding:11px 13px; border-radius:var(--radius-sm); border:1.5px solid var(--color-border);
    outline:none; color:var(--color-text-primary);
  }
  .field input:focus, .field textarea:focus{ border-color:var(--color-accent-secondary); }
  .field textarea{ resize:vertical; }
  .field-row{ display:flex; gap:12px; }
  .field-row .field{ flex:1; }

  .form-error{ font-size:13px; font-weight:600; color:var(--color-accent-orange); background:rgba(255,79,48,.08); border-radius:7px; padding:10px 12px; }

  /* ---------- Info tab ---------- */
  .how-label{ font-family:var(--font-display); font-size:12.5px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--color-text-muted); margin:16px 0 10px; }
  .info-item{ background:var(--color-surface-card); border:1px solid var(--color-border); border-radius:var(--radius-md); padding:13px 15px; font-size:13.5px; color:var(--color-text-primary); margin-bottom:9px; }
  .stat-box{ background:var(--color-bg-dark); border-radius:var(--radius-lg); padding:20px; text-align:center; margin-top:8px; }
  .stat-box .num{ font-family:var(--font-display); font-weight:700; font-size:26px; color:#fff; margin-bottom:2px; }
  .stat-box .lbl{ font-size:12.5px; color:var(--color-text-inverse-muted); }
  .footer-note{ text-align:center; font-size:11.5px; color:var(--color-text-muted); line-height:1.6; margin:22px 0 0; }

  /* ---------- Bottom nav ---------- */
  #bottom-nav{
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:460px;
    display:flex; padding:8px 8px calc(env(safe-area-inset-bottom) + 8px);
    background:rgba(255,255,255,.97); backdrop-filter:blur(12px);
    border-top:1px solid var(--color-border);
  }
  .nav-btn{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
    background:none; border:none; cursor:pointer; padding:6px 0;
    font-family:var(--font-body); font-size:11px; font-weight:600;
  }
</style>
</head>
<body>

<div id="app-shell">
  <div id="scroll-area"></div>
  <div id="bottom-nav"></div>
</div>

function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function highlight(name, q){
  if(!q) return esc(name);
  const lower = name.toLowerCase();
  let out = '', i = 0;
  while(i < name.length){
    const idx = lower.indexOf(q, i);
    if(idx === -1){ out += esc(name.slice(i)); break; }
    if(idx > i) out += esc(name.slice(i, idx));
    out += '<mark>' + esc(name.slice(idx, idx + q.length)) + '</mark>';
    i = idx + q.length;
  }
  return out;
}

function render(){
  const scroll = document.getElementById('scroll-area');
  const nav = document.getElementById('bottom-nav');
  const preserveFocus = document.activeElement && document.activeElement.id;

  if(state.selected){
    scroll.innerHTML = renderDetailView();
  } else if(state.view === 'request'){
    scroll.innerHTML = renderRequestView();
  } else if(state.view === 'info'){
    scroll.innerHTML = renderInfoView();
  } else {
    scroll.innerHTML = renderSearchView();
  }
  nav.innerHTML = renderNav();

  attachHandlers();
  if(preserveFocus){
    const el = document.getElementById(preserveFocus);
    if(el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA')){
      el.focus();
      const v = el.value; el.value=''; el.value=v;
    }
  }
}

function attachHandlers(){
  const searchInput = document.getElementById('search-input');
  if(searchInput){
    searchInput.addEventListener('input', e => { state.query = e.target.value; render(); });
  }
  const clearBtn = document.getElementById('clear-btn');
  if(clearBtn) clearBtn.addEventListener('click', () => { state.query=''; render(); });

  document.querySelectorAll('.result-card').forEach(card => {
    card.addEventListener('click', () => {
      const idx = parseInt(card.dataset.idx, 10);
      state.selected = window._filteredResults[idx];
      render();
      window.scrollTo(0,0);
    });
  });

  const goReq = document.getElementById('go-to-request');
  if(goReq) goReq.addEventListener('click', () => { state.view='request'; state.query=''; render(); });

  const backBtn = document.getElementById('back-btn');
  if(backBtn) backBtn.addEventListener('click', () => { state.selected=null; render(); });

  const nav1 = document.getElementById('nav-search');
  if(nav1) nav1.addEventListener('click', () => { state.view='search'; state.selected=null; render(); });
  const nav2 = document.getElementById('nav-request');
  if(nav2) nav2.addEventListener('click', () => { state.view='request'; state.selected=null; render(); });
  const nav3 = document.getElementById('nav-info');
  if(nav3) nav3.addEventListener('click', () => { state.view='info'; state.selected=null; render(); });

  ['f-nom','f-fabricant','f-fournisseur','f-noproduit','f-autres'].forEach(id => {
    const el = document.getElementById(id);
    if(!el) return;
    el.addEventListener('input', e => {
      const map = { 'f-nom':'nom', 'f-fabricant':'fabricant', 'f-fournisseur':'fournisseur', 'f-noproduit':'noProduit', 'f-autres':'autresInfos' };
      state.form[map[id]] = e.target.value;
      if(id === 'f-nom') state.formError = false;
    });
  });

  const submitBtn = document.getElementById('submit-request');
  if(submitBtn){
    submitBtn.addEventListener('click', () => {
      const nom = state.form.nom.trim();
      if(!nom){ state.formError = true; state.sent = false; render(); return; }
      const subject = "Demande d'ajout de produit - " + nom;
      const bodyLines = [
        'Nom du contenant : ' + nom,
        'Fabricant : ' + (state.form.fabricant.trim() || '(non précisé)'),
        'Fournisseur : ' + (state.form.fournisseur.trim() || '(non précisé)'),
        'No de produit (sur le contenant) : ' + (state.form.noProduit.trim() || '(non précisé)'),
        '', 'Autres informations pertinentes :', (state.form.autresInfos.trim() || '(aucune)')
      ];
      const mailto = 'mailto:' + encodeURIComponent(DEST_EMAIL) + '?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(bodyLines.join('\n'));
      state.formError = false;
      state.sent = true;
      render();
      window.location.href = mailto;
    });
  }
}

render();
</script>
